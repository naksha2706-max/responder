AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AI First Responder - Serverless Backend
Globals:
  Function:
    Timeout: 30
    Runtime: nodejs20.x
    MemorySize: 1024
    Environment:
      Variables:
        SESSIONS_TABLE:
          Ref: SessionsTable
        MESSAGES_TABLE:
          Ref: MessagesTable
        BEDROCK_MODEL_ID: anthropic.claude-3-haiku-20240307-v1:0
Resources:
  ResponderApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowOrigin: '''*'''
        AllowHeaders: '''Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'''
        AllowMethods: '''GET,POST,DELETE,OPTIONS'''
  MessageProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: MessageProcessorFunction
      Handler: index.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: SessionsTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: MessagesTable
      - Statement:
        - Effect: Allow
          Action:
          - bedrock:InvokeModel
          Resource: '*'
      Events:
        PostMessage:
          Type: Api
          Properties:
            RestApiId:
              Ref: ResponderApi
            Path: /message
            Method: post
        OptionsMessage:
          Type: Api
          Properties:
            RestApiId:
              Ref: ResponderApi
            Path: /message
            Method: options
    Metadata:
      SamResourceId: MessageProcessorFunction
  SessionManagerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: SessionManagerFunction
      Handler: index.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: SessionsTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: MessagesTable
      Events:
        GetSession:
          Type: Api
          Properties:
            RestApiId:
              Ref: ResponderApi
            Path: /session/{sessionId}
            Method: get
        DeleteSession:
          Type: Api
          Properties:
            RestApiId:
              Ref: ResponderApi
            Path: /session/{sessionId}
            Method: delete
        OptionsSession:
          Type: Api
          Properties:
            RestApiId:
              Ref: ResponderApi
            Path: /session/{sessionId}
            Method: options
    Metadata:
      SamResourceId: SessionManagerFunction
  HealthCheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: HealthCheckFunction
      Handler: index.handler
      Events:
        HealthCheck:
          Type: Api
          Properties:
            RestApiId:
              Ref: ResponderApi
            Path: /health
            Method: get
    Metadata:
      SamResourceId: HealthCheckFunction
  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: responder-sessions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: sessionId
        AttributeType: S
      KeySchema:
      - AttributeName: sessionId
        KeyType: HASH
      TimeToLiveSpecification:
        Enabled: true
        AttributeName: ttl
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
  MessagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: responder-messages
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: sessionId
        AttributeType: S
      - AttributeName: timestamp
        AttributeType: N
      KeySchema:
      - AttributeName: sessionId
        KeyType: HASH
      - AttributeName: timestamp
        KeyType: RANGE
Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value:
      Fn::Sub: https://${ResponderApi}.execute-api.${AWS::Region}.amazonaws.com/prod
    Export:
      Name: ResponderApiEndpoint
  SessionsTableName:
    Description: Sessions DynamoDB table name
    Value:
      Ref: SessionsTable
  MessagesTableName:
    Description: Messages DynamoDB table name
    Value:
      Ref: MessagesTable
