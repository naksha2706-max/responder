AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AI First Responder MVP - Serverless Backend

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs20.x
    MemorySize: 1024
    Environment:
      Variables:
        SESSIONS_TABLE: !Ref SessionsTable
        MESSAGES_TABLE: !Ref MessagesTable
        BEDROCK_MODEL_ID: anthropic.claude-3-haiku-20240307-v1:0
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'

Resources:
  # API Gateway
  ResponderApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowMethods: "'GET,POST,DELETE,OPTIONS'"
      Auth:
        ApiKeyRequired: false

  # Lambda: Message Processor (Main function)
  MessageProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/message-processor/
      Handler: index.handler
      Description: Processes student messages and generates AI responses
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MessagesTable
        - Statement:
          - Effect: Allow
            Action:
              - bedrock:InvokeModel
            Resource: '*'
        - Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: '*'
      Events:
        PostMessage:
          Type: Api
          Properties:
            RestApiId: !Ref ResponderApi
            Path: /message
            Method: post

  # Lambda: Session Manager
  SessionManagerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/session-manager/
      Handler: index.handler
      Description: Manages session CRUD operations
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MessagesTable
        - Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: '*'
      Events:
        GetSession:
          Type: Api
          Properties:
            RestApiId: !Ref ResponderApi
            Path: /session/{sessionId}
            Method: get
        DeleteSession:
          Type: Api
          Properties:
            RestApiId: !Ref ResponderApi
            Path: /session/{sessionId}
            Method: delete

  # Lambda: Health Check
  HealthCheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/health-check/
      Handler: index.handler
      Description: API health check endpoint
      Timeout: 10
      Events:
        HealthCheck:
          Type: Api
          Properties:
            RestApiId: !Ref ResponderApi
            Path: /health
            Method: get

  # DynamoDB: Sessions Table
  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: responder-sessions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
      TimeToLiveSpecification:
        Enabled: true
        AttributeName: ttl
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: AIFirstResponder
        - Key: Environment
          Value: MVP

  # DynamoDB: Messages Table
  MessagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: responder-messages
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      TimeToLiveSpecification:
        Enabled: true
        AttributeName: ttl
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: AIFirstResponder
        - Key: Environment
          Value: MVP

Outputs:
  ApiEndpoint:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ResponderApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
    Export:
      Name: ResponderApiEndpoint

  SessionsTableName:
    Description: "DynamoDB Sessions Table Name"
    Value: !Ref SessionsTable
    Export:
      Name: ResponderSessionsTable

  MessagesTableName:
    Description: "DynamoDB Messages Table Name"
    Value: !Ref MessagesTable
    Export:
      Name: ResponderMessagesTable
